  # ---------------------------------------------------------------------------
  # HCAS/VCAS examples with kernel params + closest-sample caching
  #
  # Cache behavior in evaluate workflow:
  # - Leave odd_json and odd_json_out unset.
  # - ODD cache path is auto-derived from:
  #   dataset_path + closest_sample_mode + kernel_type + kernel_kwargs.
  # - Jobs with same tuple above reuse closest samples/ODD from cache.
  # ---------------------------------------------------------------------------

  # NOTE: Rebuilding the global-mode ODD caches is expected and slow (hours).
  # Before the production run, delete experiments/run_all_spec.state.json (or
  # remove these two ids from it) because both ids are marked completed from
  # the broken runs.
  - id: eval-vcas-rbf
    mode: dataset
    dataset_path: data/vcas_state_variables.csv
    evaluation_samples: 1000000
    closest_sample_mode: global
    kernel_type: RBF
    kernel_kwargs:
      calibration: auto
      calibration_c: 1.0
      calibration_s: 3.0
    baseline_params:
      auto_scale: true
    local_noise_mode: nn
    local_noise_multiplier: 3.0
    threshold_mode: linear
    threshold_count: 100

  - id: eval-hcas-rbf
    mode: dataset
    dataset_path: data/hcas_state_variables.csv
    evaluation_samples: 1000000
    closest_sample_mode: global
    kernel_type: RBF
    kernel_kwargs:
      calibration: auto
      calibration_c: 1.0
      calibration_s: 3.0
    baseline_params:
      auto_scale: true
    local_noise_mode: nn
    local_noise_multiplier: 3.0
    threshold_mode: linear
    threshold_count: 100

