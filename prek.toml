# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
# :schema https://www.schemastore.org/prek.json

default_install_hook_types = [
  "pre-commit",
  "commit-msg",
  "pre-push",
  "post-checkout",
  "post-merge",
  "post-rewrite"
]
default_stages = ["pre-commit"]

[auto_update]
cooldown_days = 7

[[repos]]
hooks = [
  {id = "check-ast", priority = 9999},
  {id = "check-builtin-literals", priority = 9999},
  {id = "check-case-conflict", priority = 9999},
  {id = "check-executables-have-shebangs", priority = 9999},
  {id = "check-json", priority = 9999},
  {id = "check-merge-conflict", priority = 9999},
  {id = "check-shebang-scripts-are-executable", priority = 9999},
  {id = "check-toml", priority = 9999},
  {id = "check-yaml", priority = 9999},
  {id = "debug-statements", priority = 9999},
  {id = "end-of-file-fixer", priority = 20},
  {id = "mixed-line-ending", args = [
    "--fix=lf"
  ], exclude = "docs/make.bat", priority = 30},
  {id = "trailing-whitespace", priority = 10}
]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"

[[repos]]
hooks = [
  {id = "commitizen", priority = 9999},
  {id = "commitizen-branch", stages = [
    "pre-push"
  ], priority = 9999}
]
repo = "https://github.com/commitizen-tools/commitizen"
rev = "v4.16.3"

[[repos]]
hooks = [
  {id = "uv-sync", name = "Synchronize uv.lock with pyproject.toml", priority = 110},
  {id = "uv-audit", args = [
    "--frozen",
    "--preview-features",
    "audit"
  ], name = "Audit Python dependencies", priority = 9999}
]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.11.20"

[[repos]]
hooks = [
  {id = "reuse", name = "Check license headers (REUSE)", priority = 9999}
]
repo = "https://codeberg.org/fsfe/reuse-tool"
rev = "v6.2.0"

[[repos]]
hooks = [
  {id = "licensecheck", language = "python", name = "Check licenses of Python dependencies", priority = 9999}
]
repo = "https://github.com/FHPythonUtils/LicenseCheck"
rev = "2025.1.0"

[[repos]]
hooks = [
  {id = "validate-cff", name = "Validating CITATION.cff", priority = 9999}
]
repo = "https://github.com/citation-file-format/cffconvert"
rev = "b6045d78aac9e02b039703b030588d54d53262ac"

[[repos]]
hooks = [{id = "editorconfig-checker", priority = 9999}]
repo = "https://github.com/editorconfig-checker/editorconfig-checker.python"
rev = "3.6.1"

[[repos]]
hooks = [
  {id = "check-github-workflows", priority = 9999},
  {id = "check-github-actions", priority = 9999},
  {id = "check-dependabot", priority = 9999},
  {id = "check-gitlab-ci", priority = 9999},
  {id = "check-readthedocs", priority = 9999}
]
repo = "https://github.com/python-jsonschema/check-jsonschema"
rev = "0.37.2"

[[repos]]
hooks = [
  {id = "zizmor", name = "Lint GitHub workflow files (zizmor)", args = [
    "--fix=all"
  ], priority = 100}
]
repo = "https://github.com/zizmorcore/zizmor-pre-commit"
rev = "v1.25.2"

[[repos]]
hooks = [
  {id = "flake8", name = "Linting Python code (flake8)", additional_dependencies = [
    "flake8-docstrings",
    "flake8-docstrings-complete",
    "flake8-pyproject"
  ], priority = 9999}
]
repo = "https://github.com/PyCQA/flake8"
rev = "7.3.0"

[[repos]]
hooks = [
  {id = "ruff-check", name = "Linting Python code (ruff)", priority = 40},
  {id = "ruff-format", name = "Formatting Python code (ruff)", priority = 50}
]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.16"

[[repos]]
hooks = [
  {id = "codespell", name = "Fixing common spelling mistakes", args = [
    "--write-changes"
  ], exclude = "uv.lock|^LICENSES/", priority = 90}
]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"

[[repos]]
hooks = [
  {id = "markdownlint", name = "Fixing markdown linting errors", args = [
    "--disable",
    "MD013",
    "MD033",
    "--fix"
  ], priority = 80}
]
repo = "https://github.com/igorshubovych/markdownlint-cli"
rev = "v0.48.0"

[[repos]]
hooks = [
  {id = "pretty-format-toml", args = [
    "--autofix"
  ], exclude = "uv.lock", priority = 60},
  {id = "pretty-format-yaml", args = [
    "--autofix",
    "--indent",
    "2",
    "--offset",
    "2",
    "--preserve-quotes"
  ], priority = 70}
]
repo = "https://github.com/macisamuele/language-formatters-pre-commit-hooks"
rev = "v2.16.0"
